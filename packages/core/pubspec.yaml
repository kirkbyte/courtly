name: courtly_core
description: Theme, tokens, l10n and shared widgets for Courtly.
publish_to: none
environment:
  sdk: ^3.6.0
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  theme_tailor_annotation: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  theme_tailor: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
